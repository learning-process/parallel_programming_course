name: Pages

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  build-doxygen-xml:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y doxygen
      - name: Run Doxygen
        run: doxygen Doxyfile
      - name: Upload Doxygen documentation
        uses: actions/upload-artifact@v7
        with:
          name: doxygen-documentation-xml
          path: xml
  build-sphinx:
    runs-on: ubuntu-26.04
    needs:
      - build-doxygen-xml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y doxygen graphviz
      - name: Install dependencies
        run: |
          python3 -m pip install -r docs/requirements.txt
          python3 -m pip install graphviz pyyaml
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: doxygen-documentation-xml
          path: xml
      - name: Generate CI jobs graph
        run: |
          python3 scripts/jobs_graph.py --out docs/_static/ci_graph --format svg
      - name: Configure project
        run: >
          cmake -S . -B build -D USE_DOCS=ON -D PPC_BUILD_COMPONENTS=OFF
      - name: Build i18n
        run: |
          cmake --build build -t docs_i18n_check -- --quiet
      - name: Build documentation
        run: |
          cmake --build build -t docs_html -- --quiet
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-documentation
          path: ./build/docs/_build/html
  build-scoreboard:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r scoreboard/requirements.txt
      - name: Download performance data
        uses: actions/download-artifact@v8
        with:
          name: perf-stat
      - name: Extract performance data
        run: |
          mkdir -p build/perf_stat_dir
          unzip -o perf-stat.zip -d .
      - name: CMake configure
        run: |
          cmake -S . -B build -DUSE_SCOREBOARD=ON -DPPC_BUILD_COMPONENTS=OFF
      - name: CMake build
        run: |
          cmake --build build -t generate_scoreboard -- --quiet
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scoreboard
          path: ./build/scoreboard/html/
  deploy-pages:
    if: ${{ !github.event.repository.fork && github.ref == 'refs/heads/master' }}
    needs:
      - build-sphinx
      - build-scoreboard
    runs-on: ubuntu-26.04
    environment:
      name: github-pages
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: sphinx-documentation
          path: ./
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: scoreboard
          path: ./scoreboard/
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: cov-report
          path: ./coverage/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
