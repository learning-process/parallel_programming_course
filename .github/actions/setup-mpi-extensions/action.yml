name: Setup MPI Extensions Open MPI
description: Install Open MPI from the mpi-extensions nightly prerelease
inputs:
  prefix:
    description: Installation prefix
    default: ${{ runner.temp }}/mpi-extensions-openmpi
  platform:
    description: mpi-extensions platform name
    default: auto
  purge-system-mpi:
    description: Remove package-manager MPI installations before installing mpi-extensions
    default: 'false'
runs:
  using: composite
  steps:
    - name: Setup MPI extensions Open MPI
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        python3 "${{ github.action_path }}/setup_mpi_extensions.py"
        --repo-root "${{ github.workspace }}"
        --prefix "${{ inputs.prefix }}"
        --platform "${{ inputs.platform }}"
        --purge-system-mpi "${{ inputs.purge-system-mpi }}"
        --github-env "$GITHUB_ENV"
        --github-path "$GITHUB_PATH"
        --runner-temp "${{ runner.temp }}"
